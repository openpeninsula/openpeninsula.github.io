<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Print a poster · What could this be?</title>
<link rel="stylesheet" href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600,700&family=space-mono:400,700" />
<style>
  @font-face { font-family:"Project Blackbird"; src:url("assets/projekt-blackbird.otf") format("opentype"); font-weight:400; font-display:swap; }
  :root { --ink:#1d1b16; --coral:#e8624a; --sun:#f4b942; --river:#2f5d62; --paper:#f6f1e7; }
  * { box-sizing:border-box; }
  html,body { margin:0; }
  body { background:#cfc9bb; font-family:'Instrument Sans',system-ui,sans-serif; color:var(--ink); -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .bar { text-align:center; padding:20px 16px 4px; }
  .bar button { font:inherit; font-weight:700; font-size:15px; padding:13px 26px; border:2.5px solid var(--ink); border-radius:7px; background:var(--sun); color:var(--ink); cursor:pointer; box-shadow:3px 3px 0 var(--ink); }
  .bar button:active { transform:translate(3px,3px); box-shadow:none; }
  .bar p { color:#4a463c; font-size:13px; margin:12px auto 18px; max-width:210mm; }
  .sheet { position:relative; width:210mm; height:297mm; margin:0 auto 40px; background:#fff; overflow:hidden; box-shadow:0 6px 30px rgba(0,0,0,.25); }
  .bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .overlay { position:absolute; top:0; left:0; right:0; z-index:2; padding:16mm 16mm 0; display:flex; flex-direction:column; align-items:center; text-align:center; }
  h1 { font-family:"Project Blackbird","Instrument Sans",sans-serif; font-weight:400; font-size:50pt; line-height:1.0; letter-spacing:-0.025em; margin:0 0 2mm; white-space:nowrap; }
  h1 em { font-style:normal; color:var(--coral); }
  .points { list-style:none; margin:0 0 9mm; padding:0; max-width:158mm; }
  .points li { position:relative; padding-left:9mm; margin:0 0 4mm; font-size:14.5pt; line-height:1.35; color:#3a362e; }
  .points li::before { content:"→"; position:absolute; left:0; top:0; color:var(--coral); font-weight:800; }
  .points strong { color:var(--ink); font-weight:700; }
  .qrrow { display:inline-flex; align-items:center; gap:9mm; background:#f7f2e8; border-radius:14px; padding:7mm 9mm; align-self:flex-end; margin-top:2mm; }
  .qrbox { width:60mm; height:60mm; margin:0; }
  .qrsvg { width:100%; height:100%; display:block; }
  .scan { font-weight:700; font-size:16pt; line-height:1.25; }
  .url { font-size:15pt; color:#6b675e; font-weight:400; margin-top:-2mm; }
  .when { margin:0 0 5mm; font-size:22pt; color:#6b675e; font-weight:400; }
  .when strong { color:var(--coral); font-weight:600; }
  @page { size:A4 portrait; margin:0; }
  @media print { body{background:#fff;} .bar{display:none;} .sheet{width:210mm;height:297mm;margin:0;box-shadow:none;} }
</style>
</head>
<body>
  <div class="bar">
    <button onclick="window.print()">Print / Save as PDF &rarr;</button>
    <p>Prints on one A4 sheet (portrait). Put it up in your block, a caf&eacute;, a noticeboard, anywhere people walk past.</p>
