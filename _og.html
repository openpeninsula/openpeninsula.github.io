<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
@font-face{font-family:'BDO Grotesk';src:url('fonts/BDOGrotesk-Regular.woff2') format('woff2');font-weight:400}
@font-face{font-family:'BDO Grotesk';src:url('fonts/BDOGrotesk-DemiBold.woff2') format('woff2');font-weight:600}
@font-face{font-family:'BDO Grotesk';src:url('fonts/BDOGrotesk-Bold.woff2') format('woff2');font-weight:700}
@font-face{font-family:'BDO Grotesk';src:url('fonts/BDOGrotesk-ExtraBold.woff2') format('woff2');font-weight:800}
html,body{width:1200px;height:630px}
.card{width:1200px;height:630px;position:relative;overflow:hidden;font-family:'BDO Grotesk',sans-serif;background:#121110}
.bg{position:absolute;inset:0;background:url(images/fete.webp) center 38%/cover no-repeat}
.scrim{position:absolute;inset:0;background:linear-gradient(100deg,rgba(16,15,14,.94) 0%,rgba(16,15,14,.88) 38%,rgba(16,15,14,.55) 66%,rgba(16,15,14,.18) 100%)}
.inner{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:70px 78px}
.eyebrow{display:flex;align-items:center;gap:16px;color:#fff}
.eyebrow .mark{width:34px;height:auto;color:#e23b2e;flex:none}
.eyebrow .t{font-weight:700;font-size:22px;letter-spacing:.15em;text-transform:uppercase;opacity:.92}
.ogmark{height:54px;width:auto;color:#e23b2e;display:block;align-self:flex-start;margin:0 0 30px}
.headline{font-weight:800;font-size:51px;line-height:1.11;color:#fff;letter-spacing:-.012em;max-width:760px}
.sub{font-weight:600;font-size:23px;color:#fff;opacity:.72;margin-top:30px;max-width:680px}
</style></head><body>
<div class="card">
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="inner">
    <svg class="ogmark" viewBox="0 0 538 589" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M86.3 570.742C96.3 553.909 116.7 510.242 118.3 470.242C120.3 420.242 90.8 369.742 74.8 328.242C58.8 286.742 28.3 209.742 36.3 134.742C42.7 74.7422 78.3 49.2435 94.3 43.2435C110.3 37.2435 141.8 24.7444 178.3 51.2454C214.8 77.7464 276.8 202.241 319.8 248.242C362.8 294.244 377.8 324.243 451.3 347.243L528.8 366.747" stroke="currentColor" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div class="headline">The free Urban Village Fete is gone. Two ticketed venues are now proposed beside homes and the Thames Path.</div>
    <div class="sub">What is proposed, and how to comment before 21 July 2026.</div>
  </div>
</div>
</body></html>
